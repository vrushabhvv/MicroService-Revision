server:
  port: 8081  # port

# datasource and hibernate configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/microservices
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect #somtime dialect will be auto detected with url provided above, but it can give error sometime, so add explicitly

  config:
    import: "optional:configserver:http://localhost:8085/"

