#Gemini said Explanation of eureka configuration
#This configuration tells your UserService exactly how to behave within your microservices network.
#
#Here is the breakdown of each property:
#
#1. eureka.instance.prefer-ip-address: true
#What it does: Tells the service to register with the Eureka server using its IP address (e.g., 192.168.1.5)
#rather than its hostname (e.g., vrushabh-laptop).
#
#Why use it: In many environments (like Docker, Kubernetes, or even some office Wi-Fi networks),
              #hostnames can be unreliable or take too long to resolve. Using the IP address is faster and more stable for inter-service communication.
#
#2. eureka.client.fetch-registry: true
#What it does: Tells this service to download and "cache" the entire list of other registered services from the Eureka server.
#
#Why use it: Your UserService needs this list if it ever wants to call another service (like a HotelService or RatingService). By keeping a local copy, it doesn't have to ask the Eureka server for the address every single time it makes a call, which improves performance.
#
#3. eureka.client.register-with-eureka: true
#What it does: Tells the service to announce itself to the Eureka server.
#
#Why use it: This makes the UserService "discoverable." Without this, other services won't know your user service exists.
#
#Note: You usually set this to false only on the Eureka Server itself, because the server doesn't need to register with itself.
#
#4. eureka.client.service-url.defaultZone
#What it does: This is the address (the "phonebook's location") where the Eureka Server is running.
#
#Why use it: The client needs to know where to send its registration info and where to fetch the registry from. The defaultZone is the fallback URL used if no specific "zone" (geographic region) is defined.
#
#The Flow in your Project
#UserService starts up on Tomcat.
#
#It sees register-with-eureka: true and sends its IP (prefer-ip-address: true) to http://localhost:8761/eureka.
#
#It sees fetch-registry: true and pulls down the list of all other services (like RATING-SERVICE) so it’s ready to communicate.



#ciruit breaker configuration
#actuator
management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health #exposed health endpoint, if you want all endpoint then add **

  endpoint:
    health:
      show-details: always


#resilience4j
resilience4j:
  circuitbreaker:
    instances:
      ratingHotelBreaker: #this is circuit breaker name provided in handler method
        registerHealthIndicator: true
        evenConsumerBufferSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 6s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED

  retry:
    instances:
      ratingHotelService:
        max-attempts: 2
        wait-duration: 5s

  ratelimiter:
    instances:
      userRateLimiter:
        limit-refresh-period: 1s
        limit-for-period: 2
        timeout-duration: 0s
